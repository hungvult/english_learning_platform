# ── Shared backend environment ─────────────────────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL: "mssql+pyodbc://sa:YourStrong!Passw0rd@sqlserver:1433/EnglishLearning?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
  SECRET_KEY: "your-secret-key-change-in-production"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

services:

  # ── SQL Server 2022 ────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" -No -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ── Database initialiser (one-shot: creates EnglishLearning DB) ───────────────
  init-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      DB_NAME: "EnglishLearning"
      DB_SERVER: "sqlserver"
      DB_COLLATION: "Latin1_General_100_CI_AI_SC_UTF8"
    volumes:
      - ./scripts/init-db.sh:/init-db.sh:ro
    entrypoint: ["/bin/bash", "/init-db.sh"]
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"

  # ── FastAPI backend — hot-reload ───────────────────────────────────────────────
  backend:
    build:
      context: .                     # project root
      dockerfile: server/Dockerfile
      target: dev                    # uvicorn --reload stage
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload: every .py save is reflected immediately
      - ./server/app:/app/app
      # Persist uploaded audio across restarts
      - ./server/app/static/audio:/app/app/static/audio
    depends_on:
      sqlserver:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Next.js client — hot-reload ────────────────────────────────────────────────
  # client:
  #   build:
  #     context: ./client
  #     dockerfile: Dockerfile
  #     target: development
  #   environment:
  #     NEXT_TELEMETRY_DISABLED: "1"
  #     # Enable polling for Docker bind mounts to prevent infinite reload loops
  #     CHOKIDAR_USEPOLLING: "true"
  #     WATCHPACK_POLLING: "true"
  #     # Browser-side fetch → localhost (host machine port-forwarded by Docker)
  #     NEXT_PUBLIC_API_URL: "http://localhost:8000"
  #     NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     # Bind-mount source for Next.js HMR; exclude node_modules to use container's copy
  #     - ./client:/app
  #     - /app/node_modules
  #     - /app/.next
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

  # ── One-shot database seeder ───────────────────────────────────────────────────
  seeder:
    build:
      context: .                     # project root (needs seed_data/ + server/app/)
      dockerfile: server/Dockerfile
      target: seeder
    environment:
      <<: *backend-env
      SERVER_PATH: "/app"
    depends_on:
      sqlserver:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: "no"

volumes:
  sqlserver_data:
